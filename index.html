<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>كشف علامات المواد</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .table-shadow { box-shadow: 0 2px 15px -3px rgba(0, 0, 0, 0.07); }
    </style>
</head>
<body class="bg-gray-50 p-4">

    <div class="max-w-4xl mx-auto bg-white rounded-lg table-shadow overflow-hidden">
        <table class="w-full text-right border-collapse">
            <!-- رأس الجدول -->
            <thead class="bg-white border-b-2 border-indigo-100">
                <tr class="text-gray-600 text-sm">
                    <th class="p-4 font-bold">اسم المقرر</th>
                    <th class="p-4 font-bold">رمز المقرر</th>
                    <th class="p-4 font-bold text-center">عدد الساعات</th>
                    <th colspan="2" class="p-4 font-bold text-center border-r border-gray-100">
                        تفاصيل
                        <div class="flex justify-around mt-1 text-xs border-t pt-1">
                            <span>1</span>
                            <span>2</span>
                        </div>
                    </th>
                </tr>
            </thead>
            
            <!-- محتوى الجدول -->
            <tbody class="divide-y divide-gray-50">
                <!-- مادة مفاهيم الإنترنت -->
                <tr class="hover:bg-gray-50 transition-colors">
                    <td class="p-4 text-blue-900 font-medium">مفاهيم الإنترنت وبرمجة الوب</td>
                    <td class="p-4 text-gray-500">EIT221</td>
                    <td class="p-4 text-center">3</td>
                    <td class="p-4 text-center font-bold text-green-600 border-r border-gray-50">30 / 30</td>
                    <td class="p-4 text-center text-gray-400">-</td>
                </tr>

                <!-- مادة اللغة الإنكليزية -->
                <tr class="bg-gray-50/30 hover:bg-gray-50 transition-colors">
                    <td class="p-4 text-blue-900 font-medium">لغة إنكليزية 4</td>
                    <td class="p-4 text-gray-500">EBS201</td>
                    <td class="p-4 text-center">3</td>
                    <td class="p-4 text-center font-bold text-green-600 border-r border-gray-50">30 / 30</td>
                    <td class="p-4 text-center text-gray-400">-</td>
                </tr>

                <!-- بقية المواد كما في الصورة -->
                <tr class="hover:bg-gray-50 transition-colors">
                    <td class="p-4 text-blue-900 font-medium">بحوث العمليات</td>
                    <td class="p-4 text-gray-500">EBS300</td>
                    <td class="p-4 text-center">3</td>
                    <td class="p-4 text-center text-gray-400 border-r border-gray-50">-</td>
                    <td class="p-4 text-center text-gray-400">-</td>
                </tr>

                <tr class="hover:bg-gray-50 transition-colors">
                    <td class="p-4 text-blue-900 font-medium">أساسيات الشبكات الحاسوبية 2</td>
                    <td class="p-4 text-gray-500">EIT321</td>
                    <td class="p-4 text-center">3</td>
                    <td class="p-4 text-center text-gray-400 border-r border-gray-50">-</td>
                    <td class="p-4 text-center text-gray-400">-</td>
                </tr>
            </tbody>
        </table>
    </div>

</body>
</html>
